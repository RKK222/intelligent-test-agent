openapi: 3.1.0
info:
  description: opencode api
  title: opencode
  version: 1.0.0
servers:
- url: http://127.0.0.1:4096
tags:
- description: Experimental command routes.
  name: commands
- description: Experimental HttpApi config routes.
  name: config
- description: Control plane routes.
  name: control
- description: Control-plane orchestration routes.
  name: controlPlane
- description: Instance event stream route.
  name: event
- description: Experimental event stream route.
  name: events
- description: Experimental HttpApi read-only routes.
  name: experimental
- description: Experimental HttpApi file routes.
  name: file
- description: Experimental location-scoped filesystem routes.
  name: filesystem
- description: Global server routes.
  name: global
- description: Experimental HttpApi instance read routes.
  name: instance
- description: Integration discovery and authentication routes.
  name: integrations
- description: Experimental HttpApi MCP routes.
  name: mcp
- description: Experimental message routes.
  name: messages
- description: Experimental model routes.
  name: models
- description: Experimental HttpApi surface for selected instance routes.
  name: opencode HttpApi
- description: Experimental HttpApi permission routes.
  name: permission
- description: Experimental permission routes.
  name: permissions
- description: Experimental HttpApi project routes.
  name: project
- description: Project copy naming routes.
  name: projectCopy
- description: Experimental HttpApi provider routes.
  name: provider
- description: Experimental provider routes.
  name: providers
- description: Experimental HttpApi PTY routes.
  name: pty
- description: Question routes.
  name: question
- description: Location-scoped project references.
  name: reference
- description: Experimental HttpApi session routes.
  name: session
- description: Experimental session question routes.
  name: session questions
- description: Experimental session routes.
  name: sessions
- description: Experimental skill routes.
  name: skills
- description: Experimental HttpApi sync routes.
  name: sync
- description: Experimental HttpApi TUI routes.
  name: tui
- description: Experimental HttpApi workspace routes.
  name: workspace
paths:
  /auth/{providerID}:
    delete:
      description: Remove authentication credentials
      operationId: auth.remove
      parameters:
      - explode: false
        in: path
        name: providerID
        required: true
        schema:
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                description: Successfully removed authentication credentials
                type: boolean
          description: Successfully removed authentication credentials
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/auth_set_400_response"
          description: BadRequest | InvalidRequestError
      summary: Remove auth credentials
      tags:
      - control
      x-accepts:
      - application/json
    put:
      description: Set authentication credentials
      operationId: auth.set
      parameters:
      - explode: false
        in: path
        name: providerID
        required: true
        schema:
          type: string
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Auth"
      responses:
        "200":
          content:
            application/json:
              schema:
                description: Successfully set authentication credentials
                type: boolean
          description: Successfully set authentication credentials
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/auth_set_400_response"
          description: BadRequest | InvalidRequestError
      summary: Set auth credentials
      tags:
      - control
      x-content-type: application/json
      x-accepts:
      - application/json
  /log:
    post:
      description: Write a log entry to the server logs with specified level and metadata.
      operationId: app.log
      parameters:
      - explode: true
        in: query
        name: directory
        required: false
        schema:
          type: string
        style: form
      - explode: true
        in: query
        name: workspace
        required: false
        schema:
          type: string
        style: form
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/app_log_request"
      responses:
        "200":
          content:
            application/json:
              schema:
                description: Log entry written successfully
                type: boolean
          description: Log entry written successfully
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/auth_set_400_response"
          description: BadRequest | InvalidRequestError
      summary: Write log
      tags:
      - control
      x-content-type: application/json
      x-accepts:
      - application/json
  /experimental/control-plane/move-session:
    post:
      description: "Move a session to another project directory, optionally transferring\
        \ local changes."
      operationId: experimental.controlPlane.moveSession
      parameters: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/experimental_controlPlane_moveSession_request"
      responses:
        "204":
          description: Session moved
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/experimental_controlPlane_moveSession_400_response"
          description: MoveSessionError | InvalidRequestError
      summary: Move session
      tags:
      - controlPlane
      x-content-type: application/json
      x-accepts:
      - application/json
  /global/health:
    get:
      description: Get health information about the OpenCode server.
      operationId: global.health
      parameters: []
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/global_health_200_response"
          description: Health information
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BadRequestError"
          description: Bad request
      summary: Get health
      tags:
      - global
      x-accepts:
      - application/json
  /global/event:
    get:
      description: Subscribe to global events from the OpenCode system using server-sent
        events.
      operationId: global.event
      parameters: []
      responses:
        "200":
          content:
            text/event-stream:
              schema:
                $ref: "#/components/schemas/GlobalEvent"
          description: Event stream
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BadRequestError"
          description: Bad request
      summary: Get global events
      tags:
      - global
      x-accepts:
      - application/json
      - text/event-stream
  /global/config:
    get:
      description: Retrieve the current global OpenCode configuration settings and
        preferences.
      operationId: global.config.get
      parameters: []
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Config"
          description: Get global config info
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BadRequestError"
          description: Bad request
      summary: Get global configuration
      tags:
      - global
      x-accepts:
      - application/json
    patch:
      description: Update global OpenCode configuration settings and preferences.
      operationId: global.config.update
      parameters: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Config"
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Config"
          description: Successfully updated global config
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/auth_set_400_response"
          description: BadRequest | InvalidRequestError
      summary: Update global configuration
      tags:
      - global
      x-content-type: application/json
      x-accepts:
      - application/json
  /global/dispose:
    post:
      description: "Clean up and dispose all OpenCode instances, releasing all resources."
      operationId: global.dispose
      parameters: []
      responses:
        "200":
          content:
            application/json:
              schema:
                description: Global disposed
                type: boolean
          description: Global disposed
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BadRequestError"
          description: Bad request
      summary: Dispose instance
      tags:
      - global
      x-accepts:
      - application/json
  /global/upgrade:
    post:
      description: Upgrade opencode to the specified version or latest if not specified.
      operationId: global.upgrade
      parameters: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/global_upgrade_request"
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/global_upgrade_200_response"
          description: Upgrade result
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/auth_set_400_response"
          description: BadRequest | InvalidRequestError
      summary: Upgrade opencode
      tags:
      - global
      x-content-type: application/json
      x-accepts:
      - application/json
  /event:
    get:
      description: Get events
      operationId: event.subscribe
      parameters:
      - explode: true
        in: query
        name: directory
        required: false
        schema:
          type: string
        style: form
      - explode: true
        in: query
        name: workspace
        required: false
        schema:
          type: string
        style: form
      responses:
        "200":
          content:
            text/event-stream:
              schema:
                $ref: "#/components/schemas/Event"
          description: Event stream
      summary: Subscribe to events
      tags:
      - event
      x-accepts:
      - text/event-stream
  /config:
    get:
      description: Retrieve the current OpenCode configuration settings and preferences.
      operationId: config.get
      parameters:
      - explode: true
        in: query
        name: directory
        required: false
        schema:
          type: string
        style: form
      - explode: true
        in: query
        name: workspace
        required: false
        schema:
          type: string
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Config"
          description: Get config info
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BadRequestError"
          description: Bad request
      summary: Get configuration
      tags:
      - config
      x-accepts:
      - application/json
    patch:
      description: Update OpenCode configuration settings and preferences.
      operationId: config.update
      parameters:
      - explode: true
        in: query
        name: directory
        required: false
        schema:
          type: string
        style: form
      - explode: true
        in: query
        name: workspace
        required: false
        schema:
          type: string
        style: form
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Config"
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Config"
          description: Successfully updated config
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/auth_set_400_response"
          description: BadRequest | InvalidRequestError
      summary: Update configuration
      tags:
      - config
      x-content-type: application/json
      x-accepts:
      - application/json
  /config/providers:
    get:
      description: Get a list of all configured AI providers and their default models.
      operationId: config.providers
      parameters:
      - explode: true
        in: query
        name: directory
        required: false
        schema:
          type: string
        style: form
      - explode: true
        in: query
        name: workspace
        required: false
        schema:
          type: string
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/config_providers_200_response"
          description: List of providers
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BadRequestError"
          description: Bad request
      summary: List config providers
      tags:
      - config
      x-accepts:
      - application/json
  /experimental/capabilities:
    get:
      description: Get experimental features enabled on the OpenCode server.
      operationId: experimental.capabilities.get
      parameters:
      - explode: true
        in: query
        name: directory
        required: false
        schema:
          type: string
        style: form
      - explode: true
        in: query
        name: workspace
        required: false
        schema:
          type: string
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExperimentalCapabilities"
          description: Experimental capabilities
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BadRequestError"
          description: Bad request
      summary: Get experimental capabilities
      tags:
      - experimental
      x-accepts:
      - application/json
  /experimental/console:
    get:
      description: Get the active Console org name and the set of provider IDs managed
        by that Console org.
      operationId: experimental.console.get
      parameters:
      - explode: true
        in: query
        name: directory
        required: false
        schema:
          type: string
        style: form
      - explode: true
        in: query
        name: workspace
        required: false
        schema:
          type: string
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConsoleState"
          description: Active Console provider metadata
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BadRequestError"
          description: Bad request
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/effect_HttpApiError_InternalServerError"
          description: InternalServerError
      summary: Get active Console provider metadata
      tags:
      - experimental
      x-accepts:
      - application/json
  /experimental/console/orgs:
    get:
      description: "Get the available Console orgs across logged-in accounts, including\
        \ the current active org."
      operationId: experimental.console.listOrgs
      parameters:
      - explode: true
        in: query
        name: directory
        required: false
        schema:
          type: string
        style: form
      - explode: true
        in: query
        name: workspace
        required: false
        schema:
          type: string
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/experimental_console_listOrgs_200_response"
          description: Switchable Console orgs
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BadRequestError"
          description: Bad request
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/effect_HttpApiError_InternalServerError"
          description: InternalServerError
      summary: List switchable Console orgs
      tags:
      - experimental
      x-accepts:
      - application/json
  /experimental/console/switch:
    post:
      description: Persist a new active Console account/org selection for the current
        local OpenCode state.
      operationId: experimental.console.switchOrg
      parameters:
      - explode: true
        in: query
        name: directory
        required: false
        schema:
          type: string
        style: form
      - explode: true
        in: query
        name: workspace
        required: false
        schema:
          type: string
        style: form
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/experimental_console_switchOrg_request"
      responses:
        "200":
          content:
            application/json:
              schema:
                description: Switch success
                type: boolean
          description: Switch success
      summary: Switch active Console org
      tags:
      - experimental
      x-content-type: application/json
      x-accepts:
      - application/json
  /experimental/tool:
    get:
      description: Get a list of available tools with their JSON schema parameters
        for a specific provider and model combination.
      operationId: tool.list
      parameters:
      - explode: true
        in: query
        name: directory
        required: false
        schema:
          type: string
        style: form
      - explode: true
        in: query
        name: workspace
        required: false
        schema:
          type: string
        style: form
      - explode: true
        in: query
        name: provider
        required: true
        schema:
          type: string
        style: form
      - explode: true
        in: query
        name: model
        required: true
        schema:
          type: string
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ToolList"
          description: Tools
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/auth_set_400_response"
          description: BadRequest | InvalidRequestError
      summary: List tools
      tags:
      - experimental
      x-accepts:
      - application/json
  /experimental/tool/ids:
    get:
      description: "Get a list of all available tool IDs, including both built-in\
        \ tools and dynamically registered tools."
      operationId: tool.ids
      parameters:
      - explode: true
        in: query
        name: directory
        required: false
        schema:
          type: string
        style: form
      - explode: true
        in: query
        name: workspace
        required: false
        schema:
          type: string
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ToolIDs"
          description: Tool IDs
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/auth_set_400_response"
          description: BadRequest | InvalidRequestError
      summary: List tool IDs
      tags:
      - experimental
      x-accepts:
      - application/json
  /experimental/worktree:
    delete:
      description: Remove a git worktree and delete its branch.
      operationId: worktree.remove
      parameters:
      - explode: true
        in: query
        name: directory
        required: false
        schema:
          type: string
        style: form
      - explode: true
        in: query
        name: workspace
        required: false
        schema:
          type: string
        style: form
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WorktreeRemoveInput"
      responses:
        "200":
          content:
            application/json:
              schema:
                description: Worktree removed
                type: boolean
          description: Worktree removed
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/worktree_list_400_response"
          description: WorktreeError | InvalidRequestError
      summary: Remove worktree
      tags:
      - experimental
      x-content-type: application/json
      x-accepts:
      - application/json
    get:
      description: List all sandbox worktrees for the current project.
      operationId: worktree.list
      parameters:
      - explode: true
        in: query
        name: directory
        required: false
        schema:
          type: string
        style: form
      - explode: true
        in: query
        name: workspace
        required: false
        schema:
          type: string
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                description: List of worktree directories
                items:
                  type: string
                type: array
                default: null
          description: List of worktree directories
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/worktree_list_400_response"
          description: WorktreeError | InvalidRequestError
      summary: List worktrees
      tags:
      - experimental
      x-accepts:
      - application/json
    post:
      description: Create a new git worktree for the current project and run any configured
        startup scripts.
      operationId: worktree.create
      parameters:
      - explode: true
        in: query
        name: directory
        required: false
        schema:
          type: string
        style: form
      - explode: true
        in: query
        name: workspace
        required: false
        schema:
          type: string
        style: form
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WorktreeCreateInput"
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Worktree"
          description: Worktree created
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/worktree_list_400_response"
          description: WorktreeError | InvalidRequestError
      summary: Create worktree
      tags:
      - experimental
      x-content-type: application/json
      x-accepts:
      - application/json
  /experimental/worktree/reset:
    post:
      description: Reset a worktree branch to the primary default branch.
      operationId: worktree.reset
      parameters:
      - explode: true
        in: query
        name: directory
        required: false
        schema:
          type: string
        style: form
      - explode: true
        in: query
        name: workspace
        required: false
        schema:
          type: string
        style: form
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WorktreeResetInput"
      responses:
        "200":
          content:
            application/json:
              schema:
                description: Worktree reset
                type: boolean
          description: Worktree reset
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/worktree_list_400_response"
          description: WorktreeError | InvalidRequestError
      summary: Reset worktree
      tags:
      - experimental
      x-content-type: application/json
      x-accepts:
      - application/json
  /experimental/session:
    get:
      description: "Get a list of all OpenCode sessions across projects, sorted by\
        \ most recently updated. Archived sessions are excluded by default."
      operationId: experimental.session.list
      parameters:
      - explode: true
        in: query
        name: directory
        required: false
        schema:
          type: string
        style: form
      - explode: true
        in: query
        name: workspace
        required: false
        schema:
          type: string
        style: form
      - explode: true
        in: query
        name: roots
        required: false
        schema:
          $ref: "#/components/schemas/experimental_session_list_roots_parameter"
        style: form
      - explode: true
        in: query
        name: start
        required: false
        schema:
          type: number
        style: form
      - explode: true
        in: query
        name: cursor
        required: false
        schema:
          type: number
        style: form
      - explode: true
        in: query
        name: search
        required: false
        schema:
          type: string
        style: form
      - explode: true
        in: query
        name: limit
        required: false
        schema:
          type: number
        style: form
      - explode: true
        in: query
        name: archived
        required: false
        schema:
          $ref: "#/components/schemas/experimental_session_list_roots_parameter"
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                description: List of sessions
                items:
                  $ref: "#/components/schemas/GlobalSession"
                type: array
                default: null
          description: List of sessions
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BadRequestError"
          description: Bad request
      summary: List sessions
      tags:
      - experimental
      x-accepts:
      - application/json
  /experimental/session/{sessionID}/background:
    post:
      description: Detach any synchronous subagents currently blocking the session
        and continue them in the background.
      operationId: experimental.session.background
      parameters:
      - explode: false
        in: path
        name: sessionID
        required: true
        schema:
          pattern: ^ses
          type: string
        style: simple
      - explode: true
        in: query
        name: directory
        required: false
        schema:
          type: string
        style: form
      - explode: true
        in: query
        name: workspace
        required: false
        schema:
          type: string
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                description: Backgrounded subagents
                type: boolean
          description: Backgrounded subagents
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/auth_set_400_response"
          description: BadRequest | InvalidRequestError
      summary: Background subagents
      tags:
      - experimental
      x-accepts:
      - application/json
  /experimental/resource:
    get:
      description: Get all available MCP resources from connected servers. Optionally
        filter by name.
      operationId: experimental.resource.list
      parameters:
      - explode: true
        in: query
        name: directory
        required: false
        schema:
          type: string
        style: form
      - explode: true
        in: query
        name: workspace
        required: false
        schema:
          type: string
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                additionalProperties:
                  $ref: "#/components/schemas/McpResource"
                description: MCP resources
          description: MCP resources
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BadRequestError"
          description: Bad request
      summary: Get MCP resources
      tags:
      - experimental
      x-accepts:
      - application/json
  /find:
    get:
