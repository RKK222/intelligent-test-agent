        (PTY) session in real-time.
      operationId: pty.connect
      parameters:
      - explode: false
        in: path
        name: ptyID
        required: true
        schema:
          pattern: ^pty
          type: string
        style: simple
      - explode: true
        in: query
        name: directory
        required: false
        schema:
          type: string
        style: form
      - explode: true
        in: query
        name: workspace
        required: false
        schema:
          type: string
        style: form
      - explode: true
        in: query
        name: cursor
        required: false
        schema:
          type: string
        style: form
      - explode: true
        in: query
        name: ticket
        required: false
        schema:
          type: string
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                description: Connected session
                type: boolean
          description: Connected session
        "403":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/effect_HttpApiError_Forbidden"
          description: Forbidden
        "404":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotFoundError"
          description: Not found
      summary: Connect to PTY session
      tags:
      - pty
      x-accepts:
      - application/json
