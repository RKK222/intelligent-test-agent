services:
  postgres:
    image: postgres:16-alpine
    container_name: test-agent-postgres
    environment:
      POSTGRES_DB: ${TEST_AGENT_POSTGRES_DB:-test_agent}
      POSTGRES_USER: ${TEST_AGENT_POSTGRES_USER:-test_agent}
      POSTGRES_PASSWORD: ${TEST_AGENT_POSTGRES_PASSWORD:-test_agent}
    ports:
      - "${TEST_AGENT_POSTGRES_PORT:-15432}:5432"
    volumes:
      - test-agent-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U "$${POSTGRES_USER}" -d "$${POSTGRES_DB}"
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7.4.9-alpine
    container_name: test-agent-redis
    profiles:
      - redis
    ports:
      - "${TEST_AGENT_REDIS_PORT:-16379}:6379"
    healthcheck:
      test:
        - CMD
        - redis-cli
        - ping
      interval: 5s
      timeout: 3s
      retries: 20

  mysql:
    image: mysql:8.4
    container_name: test-agent-xxl-job-mysql
    environment:
      MYSQL_DATABASE: ${TEST_AGENT_XXL_JOB_MYSQL_DATABASE:-xxl_job}
      MYSQL_USER: ${TEST_AGENT_XXL_JOB_MYSQL_USERNAME:-xxl_job}
      MYSQL_PASSWORD: ${TEST_AGENT_XXL_JOB_MYSQL_PASSWORD:-xxl_job}
      MYSQL_ROOT_PASSWORD: ${TEST_AGENT_XXL_JOB_MYSQL_ROOT_PASSWORD:-xxl_job_root}
      TZ: Asia/Shanghai
    ports:
      - "${TEST_AGENT_XXL_JOB_MYSQL_PORT:-13306}:3306"
    volumes:
      - test-agent-xxl-job-mysql-data:/var/lib/mysql
    healthcheck:
      test:
        - CMD-SHELL
        - mysqladmin ping -h 127.0.0.1 -u root -p"$${MYSQL_ROOT_PASSWORD}" --silent
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 20s

volumes:
  test-agent-postgres-data:
  test-agent-xxl-job-mysql-data:
