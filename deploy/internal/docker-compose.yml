name: test-agent-internal

services:
  opencode-worker-1:
    image: ${TEST_AGENT_OPENCODE_WORKER_IMAGE:-test-agent-opencode-worker:internal}
    build:
      context: ../..
      dockerfile: deploy/internal/opencode-worker.Dockerfile
      args:
        GOPROXY: ${GOPROXY:-https://goproxy.cn,direct}
        NPM_REGISTRY: ${NPM_REGISTRY:-https://registry.npmmirror.com}
        DEBIAN_MIRROR: ${DEBIAN_MIRROR:-https://mirrors.tuna.tsinghua.edu.cn/debian}
        DEBIAN_SECURITY_MIRROR: ${DEBIAN_SECURITY_MIRROR:-https://mirrors.tuna.tsinghua.edu.cn/debian-security}
        OPENCODE_AI_PACKAGE: ${OPENCODE_AI_PACKAGE:-opencode-ai@1.17.8}
    container_name: test-agent-opencode-worker-1
    hostname: test-agent-opencode-worker-1
    restart: unless-stopped
    ports:
      - "${OPENCODE_WORKER_1_PORT_START:-4096}-${OPENCODE_WORKER_1_PORT_END:-4105}:${OPENCODE_WORKER_1_PORT_START:-4096}-${OPENCODE_WORKER_1_PORT_END:-4105}"
    environment:
      OPENCODE_MANAGER_BACKEND_PORT: "${OPENCODE_WORKER_1_BACKEND_PORT:-8080}"
      OPENCODE_MANAGER_PORT_START: "${OPENCODE_WORKER_1_PORT_START:-4096}"
      OPENCODE_MANAGER_PORT_END: "${OPENCODE_WORKER_1_PORT_END:-4105}"
      OPENCODE_MANAGER_TOKEN: "${TEST_AGENT_OPENCODE_MANAGER_TOKEN:?set TEST_AGENT_OPENCODE_MANAGER_TOKEN}"
      OPENCODE_MANAGER_STATE_DIR: "/data/.testagent/agent-opencode/manager/worker-1"
      OPENCODE_BIN: "/opt/test-agent/programs/opencode/bin/opencode"
      TEST_AGENT_PROGRAM_ROOT: "/opt/test-agent/programs"
      OPENCODE_ALLOWED_CORS: "${OPENCODE_ALLOWED_CORS:-}"
      OPENCODE_MANAGER_HEARTBEAT_INTERVAL: "${OPENCODE_MANAGER_HEARTBEAT_INTERVAL:-5s}"
      OPENCODE_MANAGER_RECONNECT_INTERVAL: "${OPENCODE_MANAGER_RECONNECT_INTERVAL:-10s}"
    volumes:
      - "${TEST_AGENT_DATA_ROOT:-/data/.testagent}:/data/.testagent"
      - "${TEST_AGENT_PROGRAM_ROOT:-./dist/programs}:/opt/test-agent/programs:ro"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'opencode-manager run' >/dev/null"]
      interval: 10s
      timeout: 3s
      retries: 12

  opencode-worker-2:
    image: ${TEST_AGENT_OPENCODE_WORKER_IMAGE:-test-agent-opencode-worker:internal}
    build:
      context: ../..
      dockerfile: deploy/internal/opencode-worker.Dockerfile
      args:
        GOPROXY: ${GOPROXY:-https://goproxy.cn,direct}
        NPM_REGISTRY: ${NPM_REGISTRY:-https://registry.npmmirror.com}
        DEBIAN_MIRROR: ${DEBIAN_MIRROR:-https://mirrors.tuna.tsinghua.edu.cn/debian}
        DEBIAN_SECURITY_MIRROR: ${DEBIAN_SECURITY_MIRROR:-https://mirrors.tuna.tsinghua.edu.cn/debian-security}
        OPENCODE_AI_PACKAGE: ${OPENCODE_AI_PACKAGE:-opencode-ai@1.17.8}
    container_name: test-agent-opencode-worker-2
    hostname: test-agent-opencode-worker-2
    restart: unless-stopped
    ports:
      - "${OPENCODE_WORKER_2_PORT_START:-4106}-${OPENCODE_WORKER_2_PORT_END:-4115}:${OPENCODE_WORKER_2_PORT_START:-4106}-${OPENCODE_WORKER_2_PORT_END:-4115}"
    environment:
      OPENCODE_MANAGER_BACKEND_PORT: "${OPENCODE_WORKER_2_BACKEND_PORT:-8081}"
      OPENCODE_MANAGER_PORT_START: "${OPENCODE_WORKER_2_PORT_START:-4106}"
      OPENCODE_MANAGER_PORT_END: "${OPENCODE_WORKER_2_PORT_END:-4115}"
      OPENCODE_MANAGER_TOKEN: "${TEST_AGENT_OPENCODE_MANAGER_TOKEN:?set TEST_AGENT_OPENCODE_MANAGER_TOKEN}"
      OPENCODE_MANAGER_STATE_DIR: "/data/.testagent/agent-opencode/manager/worker-2"
      OPENCODE_BIN: "/opt/test-agent/programs/opencode/bin/opencode"
      TEST_AGENT_PROGRAM_ROOT: "/opt/test-agent/programs"
      OPENCODE_ALLOWED_CORS: "${OPENCODE_ALLOWED_CORS:-}"
      OPENCODE_MANAGER_HEARTBEAT_INTERVAL: "${OPENCODE_MANAGER_HEARTBEAT_INTERVAL:-5s}"
      OPENCODE_MANAGER_RECONNECT_INTERVAL: "${OPENCODE_MANAGER_RECONNECT_INTERVAL:-10s}"
    volumes:
      - "${TEST_AGENT_DATA_ROOT:-/data/.testagent}:/data/.testagent"
      - "${TEST_AGENT_PROGRAM_ROOT:-./dist/programs}:/opt/test-agent/programs:ro"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'opencode-manager run' >/dev/null"]
      interval: 10s
      timeout: 3s
      retries: 12
