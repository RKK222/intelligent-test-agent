spring:
  application:
    name: test-agent
  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    druid:
      driver-class-name: ${TEST_AGENT_DB_DRIVER_CLASS_NAME:org.postgresql.Driver}
      url: ${TEST_AGENT_DB_URL:}
      username: ${TEST_AGENT_DB_USERNAME:}
      password: ${TEST_AGENT_DB_PASSWORD:}
      initial-size: ${TEST_AGENT_DB_POOL_INITIAL_SIZE:5}
      min-idle: ${TEST_AGENT_DB_POOL_MIN_IDLE:10}
      max-active: ${TEST_AGENT_DB_POOL_MAX_ACTIVE:50}
      max-wait: ${TEST_AGENT_DB_POOL_MAX_WAIT_MILLIS:10000}
      validation-query: SELECT 1
      validation-query-timeout: 3
      test-while-idle: true
      test-on-borrow: ${TEST_AGENT_DB_POOL_TEST_ON_BORROW:false}
      test-on-return: false
      keep-alive: true
      time-between-eviction-runs-millis: 60000
      min-evictable-idle-time-millis: 300000
      stat-view-servlet:
        enabled: false
      web-stat-filter:
        enabled: false
      filter:
        stat:
          enabled: true
          db-type: postgresql
          log-slow-sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration

  data:
    redis:
      host: ${TEST_AGENT_REDIS_HOST:}
      port: ${TEST_AGENT_REDIS_PORT:6379}
      password: ${TEST_AGENT_REDIS_PASSWORD:}
      timeout: ${TEST_AGENT_REDIS_TIMEOUT:1s}

mybatis:
  mapper-locations: classpath*:mybatis/**/*.xml
  configuration:
    map-underscore-to-camel-case: true

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  health:
    db:
      enabled: true

test-agent:
  flyway:
    gauss-role-restore-compatibility: ${TEST_AGENT_FLYWAY_GAUSS_ROLE_RESTORE_COMPATIBILITY:false}
  deployment:
    mode: ${TEST_AGENT_DEPLOYMENT_MODE:external}
  security:
    api-token: ${TEST_AGENT_API_TOKEN:}
    cors-allowed-origins: ${TEST_AGENT_CORS_ALLOWED_ORIGINS:http://localhost:3000,http://127.0.0.1:3000,http://localhost:4173,http://127.0.0.1:4173,http://localhost:4177,http://127.0.0.1:4177,http://localhost:4187,http://127.0.0.1:4187,http://localhost:5173,http://127.0.0.1:5173,http://localhost:5174,http://127.0.0.1:5174}
  rate-limit:
    enabled: ${TEST_AGENT_RATE_LIMIT_ENABLED:false}
    capacity: ${TEST_AGENT_RATE_LIMIT_CAPACITY:120}
    window: ${TEST_AGENT_RATE_LIMIT_WINDOW:1m}
  redis-summary:
    enabled: ${TEST_AGENT_REDIS_SUMMARY_ENABLED:false}
    rollout-percentage: ${TEST_AGENT_REDIS_SUMMARY_ROLLOUT_PERCENTAGE:0}
    legacy-run-without-context-enabled: ${TEST_AGENT_LEGACY_RUN_WITHOUT_CONTEXT_ENABLED:true}
  files:
    max-file-bytes: ${TEST_AGENT_MAX_FILE_BYTES:1048576}
    max-directory-entries: ${TEST_AGENT_MAX_DIRECTORY_ENTRIES:1000}
  managed-workspace:
    replica-reconciler:
      enabled: true
      interval-seconds: 60
  model-catalog:
    source: ${TEST_AGENT_MODEL_CATALOG_SOURCE:internal}
    external:
      provider-id: ${TEST_AGENT_EXTERNAL_MODEL_PROVIDER_ID:external-openai}
      name: ${TEST_AGENT_EXTERNAL_MODEL_PROVIDER_NAME:External OpenAI Compatible}
      base-url: ${TEST_AGENT_EXTERNAL_MODEL_BASE_URL:${TEST_AGENT_BAILIAN_BASE_URL:}}
      api-key-env: ${TEST_AGENT_EXTERNAL_MODEL_API_KEY_ENV:${TEST_AGENT_BAILIAN_API_KEY_ENV:EXTERNAL_API_KEY}}
      api-key: ""
      auth-mode: bearer
      default-model: ${TEST_AGENT_EXTERNAL_MODEL_DEFAULT_MODEL:${TEST_AGENT_BAILIAN_DEFAULT_MODEL:}}
    internal:
      provider-id: ${TEST_AGENT_INTERNAL_MODEL_PROVIDER_ID:icbc-openai}
      name: ${TEST_AGENT_INTERNAL_MODEL_PROVIDER_NAME:ICBC OpenAI}
      base-url: ${TEST_AGENT_ICBC_OPENAI_BASE_URL:http://ai-code.sdc.icbc:9070/icbc/jdt/model/api/openai/v1}
      api-key-env: ${TEST_AGENT_ICBC_OPENAI_TOKEN_ENV:ICBC_OPENAI_AUTH_TOKEN}
      api-key: ""
      ucid-header-name: ${TEST_AGENT_ICBC_OPENAI_UCID_HEADER_NAME:ucid}
      auth-mode: ${TEST_AGENT_ICBC_OPENAI_AUTH_MODE:auth-token}
      default-model: ${TEST_AGENT_INTERNAL_DEFAULT_MODEL:DeepSeek-V4-Flash-W8A8}
  scheduler:
    enabled: ${TEST_AGENT_SCHEDULER_ENABLED:true}
    scan-interval: ${TEST_AGENT_SCHEDULER_SCAN_INTERVAL:30s}
    due-task-limit: ${TEST_AGENT_SCHEDULER_DUE_TASK_LIMIT:50}
    manual-run-limit: ${TEST_AGENT_SCHEDULER_MANUAL_RUN_LIMIT:50}
    instance-id: ${TEST_AGENT_SCHEDULER_INSTANCE_ID:backend-${random.uuid}}
  server-broadcast:
    enabled: ${TEST_AGENT_SERVER_BROADCAST_ENABLED:false}
    channel: ${TEST_AGENT_SERVER_BROADCAST_CHANNEL:test-agent:server-broadcast}
    instance-id: ${TEST_AGENT_SERVER_BROADCAST_INSTANCE_ID:}
  analytics:
    rollup:
      enabled: ${TEST_AGENT_ANALYTICS_ROLLUP_ENABLED:true}
      fixed-delay-ms: ${TEST_AGENT_ANALYTICS_ROLLUP_FIXED_DELAY_MS:300000}
  terminal:
    max-input-bytes: 16384
    input-messages-per-window: 64
    resize-messages-per-window: 10
    rate-limit-window: 1s
    max-output-frame-bytes: 16384
    max-output-connection-bytes: 1048576
    idle-timeout: 10m
    hard-timeout: 2h
    ticket-capacity: 10
    ticket-window: 1m
  opencode:
    manager-control:
      token: ${TEST_AGENT_OPENCODE_MANAGER_TOKEN:}
      heartbeat-interval: ${TEST_AGENT_BACKEND_HEARTBEAT_INTERVAL:5s}
      backend-stale-after: ${TEST_AGENT_BACKEND_STALE_AFTER:10s}
      command-timeout: ${TEST_AGENT_OPENCODE_MANAGER_COMMAND_TIMEOUT:10s}
      backend-discovery-limit: ${TEST_AGENT_BACKEND_DISCOVERY_LIMIT:100}
  # Git 浅克隆缓存配置，用于加载远端仓库目录结构
  git-clone-cache:
    cache-root: ${TEST_AGENT_GIT_CACHE_ROOT:}
    cache-expiry: ${TEST_AGENT_GIT_CACHE_EXPIRY:1h}
    clone-timeout: ${TEST_AGENT_GIT_CLONE_TIMEOUT:5m}
