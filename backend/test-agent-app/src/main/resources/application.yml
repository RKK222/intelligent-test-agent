spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:guo}
  application:
    name: test-agent
  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    druid:
      initial-size: ${TEST_AGENT_DB_POOL_INITIAL_SIZE:1}
      min-idle: ${TEST_AGENT_DB_POOL_MIN_IDLE:1}
      max-active: ${TEST_AGENT_DB_POOL_MAX_ACTIVE:10}
      max-wait: ${TEST_AGENT_DB_POOL_MAX_WAIT_MILLIS:30000}
      validation-query: SELECT 1
      test-while-idle: true
      # 借出连接前校验，避免远端 PostgreSQL 断开 idle 连接后首个请求拿到 stale connection。
      test-on-borrow: ${TEST_AGENT_DB_POOL_TEST_ON_BORROW:true}
      test-on-return: false
      time-between-eviction-runs-millis: 60000
      min-evictable-idle-time-millis: 300000
      stat-view-servlet:
        enabled: false
      web-stat-filter:
        enabled: false
      filter:
        stat:
          enabled: true
          db-type: postgresql
          log-slow-sql: false

  data:
    redis:
      host: ${TEST_AGENT_REDIS_HOST:127.0.0.1}
      port: ${TEST_AGENT_REDIS_PORT:6379}
      password: ${TEST_AGENT_REDIS_PASSWORD:}
      timeout: ${TEST_AGENT_REDIS_TIMEOUT:1s}

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

test-agent:
  security:
    api-token: ${TEST_AGENT_API_TOKEN:}
    cors-allowed-origins: ${TEST_AGENT_CORS_ALLOWED_ORIGINS:http://localhost:3000,http://127.0.0.1:3000,http://localhost:4173,http://127.0.0.1:4173,http://localhost:4177,http://127.0.0.1:4177,http://localhost:4187,http://127.0.0.1:4187,http://localhost:5173,http://127.0.0.1:5173,http://localhost:5174,http://127.0.0.1:5174}
  rate-limit:
    enabled: ${TEST_AGENT_RATE_LIMIT_ENABLED:false}
    capacity: ${TEST_AGENT_RATE_LIMIT_CAPACITY:120}
    window: ${TEST_AGENT_RATE_LIMIT_WINDOW:1m}
  files:
    max-file-bytes: ${TEST_AGENT_MAX_FILE_BYTES:1048576}
    max-directory-entries: ${TEST_AGENT_MAX_DIRECTORY_ENTRIES:1000}
  workspace-picker:
    allowed-roots: D:/workspace
  # 公共目录：所有登录用户可浏览/读取，SUPER_ADMIN 额外可写；留空表示禁用。
  # 各 profile 协商默认值：guo = D:/agents，其他 profile = /data/agents-pub，可用 env 覆盖。
  public-directory:
    path: ${TEST_AGENT_PUBLIC_DIRECTORY_PATH:/data/agents-pub}
  managed-workspace:
    root: ${TEST_AGENT_MANAGED_WORKSPACE_ROOT:}
  redis:
    enabled: ${TEST_AGENT_REDIS_ENABLED:true}
    host: ${TEST_AGENT_REDIS_HOST:127.0.0.1}
    port: ${TEST_AGENT_REDIS_PORT:6379}
    password: ${TEST_AGENT_REDIS_PASSWORD:}
    timeout: ${TEST_AGENT_REDIS_TIMEOUT:1s}
  scheduler:
    enabled: ${TEST_AGENT_SCHEDULER_ENABLED:false}
    scan-interval: ${TEST_AGENT_SCHEDULER_SCAN_INTERVAL:30s}
    due-task-limit: ${TEST_AGENT_SCHEDULER_DUE_TASK_LIMIT:50}
    manual-run-limit: ${TEST_AGENT_SCHEDULER_MANUAL_RUN_LIMIT:50}
  opencode:
    manager-control:
      token: ${TEST_AGENT_OPENCODE_MANAGER_TOKEN:}
      listen-url: ${TEST_AGENT_BACKEND_LISTEN_URL:http://127.0.0.1:8080}
      linux-server-id: ${TEST_AGENT_LINUX_SERVER_ID:127.0.0.1}
      heartbeat-interval: ${TEST_AGENT_BACKEND_HEARTBEAT_INTERVAL:10s}
      backend-stale-after: ${TEST_AGENT_BACKEND_STALE_AFTER:30s}
      command-timeout: ${TEST_AGENT_OPENCODE_MANAGER_COMMAND_TIMEOUT:10s}
      backend-discovery-limit: ${TEST_AGENT_BACKEND_DISCOVERY_LIMIT:100}
    nodes: []
  # Git 浅克隆缓存配置，用于加载远端仓库目录结构
  git-clone-cache:
    cache-root: ${TEST_AGENT_GIT_CACHE_ROOT:}
    cache-expiry: ${TEST_AGENT_GIT_CACHE_EXPIRY:1h}
    clone-timeout: ${TEST_AGENT_GIT_CLONE_TIMEOUT:5m}
