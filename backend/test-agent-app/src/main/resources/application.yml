spring:
  application:
    name: test-agent
  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    druid:
      driver-class-name: ${TEST_AGENT_DB_DRIVER_CLASS_NAME:org.postgresql.Driver}
      url: ${TEST_AGENT_DB_URL:}
      username: ${TEST_AGENT_DB_USERNAME:}
      password: ${TEST_AGENT_DB_PASSWORD:}
      initial-size: ${TEST_AGENT_DB_POOL_INITIAL_SIZE:5}
      min-idle: ${TEST_AGENT_DB_POOL_MIN_IDLE:10}
      max-active: ${TEST_AGENT_DB_POOL_MAX_ACTIVE:50}
      max-wait: ${TEST_AGENT_DB_POOL_MAX_WAIT_MILLIS:10000}
      validation-query: SELECT 1
      validation-query-timeout: 3
      test-while-idle: true
      test-on-borrow: ${TEST_AGENT_DB_POOL_TEST_ON_BORROW:false}
      test-on-return: false
      keep-alive: true
      time-between-eviction-runs-millis: 60000
      min-evictable-idle-time-millis: 300000
      stat-view-servlet:
        enabled: false
      web-stat-filter:
        enabled: false
      filter:
        stat:
          enabled: true
          db-type: postgresql
          log-slow-sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration

  data:
    redis:
      host: ${TEST_AGENT_REDIS_HOST:}
      port: ${TEST_AGENT_REDIS_PORT:6379}
      password: ${TEST_AGENT_REDIS_PASSWORD:}
      timeout: ${TEST_AGENT_REDIS_TIMEOUT:1s}

mybatis:
  mapper-locations: classpath*:mybatis/**/*.xml
  configuration:
    map-underscore-to-camel-case: true

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      probes:
        enabled: true
      group:
        readiness:
          include: readinessState,db,redis
  health:
    db:
      enabled: true

test-agent:
  third-party-api:
    base-url: http://tcds-prod.sdc.icbc
  deployment:
    mode: ${TEST_AGENT_DEPLOYMENT_MODE:external}
  security:
    api-token: ${TEST_AGENT_API_TOKEN:}
    cors-allowed-origins: ${TEST_AGENT_CORS_ALLOWED_ORIGINS:http://localhost:3000,http://127.0.0.1:3000,http://localhost:4173,http://127.0.0.1:4173,http://localhost:4177,http://127.0.0.1:4177,http://localhost:4187,http://127.0.0.1:4187,http://localhost:5173,http://127.0.0.1:5173,http://localhost:5174,http://127.0.0.1:5174}
  rate-limit:
    enabled: ${TEST_AGENT_RATE_LIMIT_ENABLED:false}
    capacity: ${TEST_AGENT_RATE_LIMIT_CAPACITY:120}
    window: ${TEST_AGENT_RATE_LIMIT_WINDOW:1m}
  redis-summary:
    enabled: ${TEST_AGENT_REDIS_SUMMARY_ENABLED:false}
    rollout-percentage: ${TEST_AGENT_REDIS_SUMMARY_ROLLOUT_PERCENTAGE:0}
    legacy-run-without-context-enabled: ${TEST_AGENT_LEGACY_RUN_WITHOUT_CONTEXT_ENABLED:true}
  files:
    max-preview-bytes: ${TEST_AGENT_MAX_PREVIEW_BYTES:${TEST_AGENT_MAX_FILE_BYTES:5242880}}
    upload-chunk-bytes: ${TEST_AGENT_UPLOAD_CHUNK_BYTES:262144}
    max-directory-entries: ${TEST_AGENT_MAX_DIRECTORY_ENTRIES:1000}
  managed-workspace:
    replica-reconciler:
      enabled: true
      interval-seconds: 60
  model-catalog:
    source: ${TEST_AGENT_MODEL_CATALOG_SOURCE:internal}
    external:
      provider-id: ${TEST_AGENT_EXTERNAL_MODEL_PROVIDER_ID:external-openai}
      name: ${TEST_AGENT_EXTERNAL_MODEL_PROVIDER_NAME:External OpenAI Compatible}
      base-url: ${TEST_AGENT_EXTERNAL_MODEL_BASE_URL:${TEST_AGENT_BAILIAN_BASE_URL:}}
      api-key-env: ${TEST_AGENT_EXTERNAL_MODEL_API_KEY_ENV:${TEST_AGENT_BAILIAN_API_KEY_ENV:EXTERNAL_API_KEY}}
      api-key: ""
      auth-mode: bearer
      default-model: ${TEST_AGENT_EXTERNAL_MODEL_DEFAULT_MODEL:${TEST_AGENT_BAILIAN_DEFAULT_MODEL:}}
    internal:
      provider-id: ${TEST_AGENT_INTERNAL_MODEL_PROVIDER_ID:enterprise-openai}
      name: ${TEST_AGENT_INTERNAL_MODEL_PROVIDER_NAME:Enterprise OpenAI}
      base-url: ${TEST_AGENT_ENTERPRISE_OPENAI_BASE_URL:http://ai-code.sdc.icbc:9070/enterprise/jdt/model/api/openai/v1}
      api-key-env: ${TEST_AGENT_ENTERPRISE_OPENAI_TOKEN_ENV:ENTERPRISE_OPENAI_AUTH_TOKEN}
      api-key: ""
      ucid-header-name: ${TEST_AGENT_ENTERPRISE_OPENAI_UCID_HEADER_NAME:ucid}
      auth-mode: ${TEST_AGENT_ENTERPRISE_OPENAI_AUTH_MODE:auth-token}
      default-model: ${TEST_AGENT_INTERNAL_DEFAULT_MODEL:Qwen3.6-27B}
  xxl-job:
    enabled: ${TEST_AGENT_XXL_JOB_ENABLED:true}
    access-token: ${TEST_AGENT_XXL_JOB_ACCESS_TOKEN:10fd68f816007609067786ece7e8be0e8ec94d20bee733e4f500cf6f7598e502}
    admin:
      port: ${TEST_AGENT_XXL_JOB_ADMIN_PORT:18080}
      context-path: /xxl-job-admin
      retry-initial-delay: 5s
      retry-max-delay: 60s
    mysql:
      url: ${TEST_AGENT_XXL_JOB_MYSQL_URL:jdbc:mysql://127.0.0.1:13306/xxl_job?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai}
      username: ${TEST_AGENT_XXL_JOB_MYSQL_USERNAME:xxl_job}
      password: ${TEST_AGENT_XXL_JOB_MYSQL_PASSWORD:}
    executor:
      app-name: test-agent-backend
      port: ${TEST_AGENT_XXL_JOB_EXECUTOR_PORT:9999}
      log-path: ${TEST_AGENT_XXL_JOB_EXECUTOR_LOG_PATH:logs/xxl-job}
      log-retention-days: 30
    sso:
      ticket-ttl: 60s
  server-broadcast:
    enabled: ${TEST_AGENT_SERVER_BROADCAST_ENABLED:false}
    channel: ${TEST_AGENT_SERVER_BROADCAST_CHANNEL:test-agent:server-broadcast}
    instance-id: ${TEST_AGENT_SERVER_BROADCAST_INSTANCE_ID:}
  terminal:
    server-enabled: ${TEST_AGENT_SERVER_TERMINAL_ENABLED:false}
    server-working-directory: ${TEST_AGENT_SERVER_TERMINAL_WORKING_DIRECTORY:${user.dir}}
    public-websocket-base-url: ${TEST_AGENT_SERVER_TERMINAL_PUBLIC_WEBSOCKET_BASE_URL:}
    allow-insecure-server-websocket: ${TEST_AGENT_SERVER_TERMINAL_ALLOW_INSECURE_WEBSOCKET:false}
    max-input-bytes: 16384
    input-messages-per-window: 64
    resize-messages-per-window: 10
    rate-limit-window: 1s
    max-output-frame-bytes: 16384
    max-output-connection-bytes: 1048576
    idle-timeout: 10m
    hard-timeout: 2h
    ticket-capacity: 10
    ticket-window: 1m
  opencode:
    manager-control:
      token: ${TEST_AGENT_OPENCODE_MANAGER_TOKEN:}
      heartbeat-interval: ${TEST_AGENT_BACKEND_HEARTBEAT_INTERVAL:5s}
      backend-stale-after: ${TEST_AGENT_BACKEND_STALE_AFTER:10s}
      command-timeout: ${TEST_AGENT_OPENCODE_MANAGER_COMMAND_TIMEOUT:10s}
      backend-discovery-limit: ${TEST_AGENT_BACKEND_DISCOVERY_LIMIT:100}
  # Git 浅克隆缓存配置，用于加载远端仓库目录结构
  git-clone-cache:
    cache-root: ${TEST_AGENT_GIT_CACHE_ROOT:}
    cache-expiry: ${TEST_AGENT_GIT_CACHE_EXPIRY:1h}
    clone-timeout: ${TEST_AGENT_GIT_CLONE_TIMEOUT:5m}
