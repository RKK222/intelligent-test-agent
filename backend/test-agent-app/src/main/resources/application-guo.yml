spring:
  config:
    activate:
      on-profile: guo
  datasource:
    druid:
      driver-class-name: org.postgresql.Driver
      url: jdbc:postgresql://192.168.100.200:5432/testagent?sslmode=disable
      username: testagent
      password: testagent
  flyway:
    enabled: false
    locations: classpath:db/migration
  data:
    redis:
      host: 192.168.100.200
      port: 16379
      password: ""
      timeout: 1s

test-agent:
  security:
    api-token: ""
    cors-allowed-origins: http://localhost:3000,http://127.0.0.1:3000,http://127.0.0.1:3000,http://localhost:4173,http://127.0.0.1:4173,http://localhost:4177,http://127.0.0.1:4177,http://localhost:4187,http://127.0.0.1:4187,http://localhost:5173,http://127.0.0.1:5173,http://localhost:5174,http://127.0.0.1:5174
  rate-limit:
    enabled: false
    capacity: 120
    window: 1m
  files:
    max-file-bytes: 1048576
    max-directory-entries: 1000
  model-catalog:
    source: external
    external:
      provider-id: ${TEST_AGENT_EXTERNAL_MODEL_PROVIDER_ID:external-openai}
      name: ${TEST_AGENT_EXTERNAL_MODEL_PROVIDER_NAME:External OpenAI Compatible}
      base-url: ${TEST_AGENT_EXTERNAL_MODEL_BASE_URL:${TEST_AGENT_BAILIAN_BASE_URL:}}
      api-key-env: ${TEST_AGENT_EXTERNAL_MODEL_API_KEY_ENV:${TEST_AGENT_BAILIAN_API_KEY_ENV:EXTERNAL_API_KEY}}
      auth-mode: bearer
      default-model: ${TEST_AGENT_EXTERNAL_MODEL_DEFAULT_MODEL:${TEST_AGENT_BAILIAN_DEFAULT_MODEL:}}
    internal:
      provider-id: icbc-openai
      name: ICBC OpenAI
      base-url: http://ai-code.sdc.icbc:9070/icbc/jdt/model/api/openai/v1
      api-key-env: ICBC_OPENAI_AUTH_TOKEN
      auth-mode: auth-token
      default-model: DeepSeek-V4-Flash-W8A8
  opencode:
    manager-control:
      token: local-manager-token
      heartbeat-interval: 10s
      backend-stale-after: 30s
      command-timeout: 10s
      backend-discovery-limit: 100

management:
  health:
    db:
      enabled: true
