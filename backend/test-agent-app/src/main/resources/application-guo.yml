  workspace-picker:
    allowed-roots:
      - /Users/kaka/Desktop
      - D:/workspace
  public-directory:
    path: D:/agents
  managed-workspace:
    root: ""
  redis:
    enabled: true
    host: 192.168.100.200
    port: 16379
    password: ""
  model-catalog:
    source: bailian
    external:
      provider-id: modelstudio
      name: Model Studio Coding Plan
      base-url: https://coding.dashscope.aliyuncs.com/v1
      api-key-env: MODELSTUDIO_API_KEY
      api-key: sk-sp-ffacbe80d6a24711b216456f41be0d07
      auth-mode: bearer
      default-model: qwen3.5-plus
    internal:
      provider-id: icbc-openai
      name: ICBC OpenAI
