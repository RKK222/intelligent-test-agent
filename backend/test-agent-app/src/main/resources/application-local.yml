spring:
  config:
    activate:
      on-profile: local
  datasource:
    druid:
      driver-class-name: org.postgresql.Driver
      url: jdbc:postgresql://${TEST_AGENT_LOCAL_DB_HOST:127.0.0.1}:${TEST_AGENT_LOCAL_DB_PORT:15432}/${TEST_AGENT_LOCAL_DB_NAME:test_agent}
      username: ${TEST_AGENT_LOCAL_DB_USERNAME:test_agent}
      password: ${TEST_AGENT_LOCAL_DB_PASSWORD:test_agent}
  flyway:
    enabled: true
    locations: classpath:db/migration

test-agent:
  security:
    api-token: ${TEST_AGENT_API_TOKEN:}
    cors-allowed-origins:
      - ${TEST_AGENT_CORS_ORIGIN:http://localhost:3000}
      - ${TEST_AGENT_CORS_ORIGIN_LOOPBACK:http://127.0.0.1:3000}
  rate-limit:
    enabled: ${TEST_AGENT_RATE_LIMIT_ENABLED:false}
    capacity: ${TEST_AGENT_RATE_LIMIT_CAPACITY:120}
    window: ${TEST_AGENT_RATE_LIMIT_WINDOW:1m}
  redis:
    enabled: ${TEST_AGENT_REDIS_ENABLED:false}
    host: ${TEST_AGENT_REDIS_HOST:127.0.0.1}
    port: ${TEST_AGENT_REDIS_PORT:16379}
  opencode:
    nodes:
      - id: ${TEST_AGENT_OPENCODE_NODE_ID:node_local_opencode}
        base-url: ${TEST_AGENT_OPENCODE_BASE_URL:http://127.0.0.1:4096}
        max-runs: ${TEST_AGENT_OPENCODE_MAX_RUNS:4}
        weight: ${TEST_AGENT_OPENCODE_WEIGHT:100}
        capabilities:
          - chat
          - diff
          - test

management:
  health:
    db:
      enabled: true
