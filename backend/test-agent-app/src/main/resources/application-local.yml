spring:
  config:
    activate:
      on-profile: local
  datasource:
    druid:
      driver-class-name: org.postgresql.Driver
      # 远程 PostgreSQL 关闭了 SSL，但 JDBC 默认会发起 SSL 协商，对端直接断开导致 EOFException。
      # 显式 sslmode=disable 跳过协商，仅用于 local profile。
      url: jdbc:postgresql://${TEST_AGENT_LOCAL_DB_HOST:127.0.0.1}:${TEST_AGENT_LOCAL_DB_PORT:15432}/${TEST_AGENT_LOCAL_DB_NAME:test_agent}?sslmode=disable
      username: ${TEST_AGENT_LOCAL_DB_USERNAME:test_agent}
      password: ${TEST_AGENT_LOCAL_DB_PASSWORD:test_agent}
  flyway:
    enabled: true
    locations: classpath:db/migration
  data:
    redis:
      host: ${TEST_AGENT_REDIS_HOST:127.0.0.1}
      port: ${TEST_AGENT_REDIS_PORT:6379}
      password: ${TEST_AGENT_REDIS_PASSWORD:}
      timeout: ${TEST_AGENT_REDIS_TIMEOUT:1s}

test-agent:
  workspace-picker:
    allowed-roots: ${TEST_AGENT_WORKSPACE_PICKER_ROOTS:${user.home}/workspace}
  # 公共目录：base 协商默认 /data/agents-pub，本地如无该目录可显式 env 覆盖或留空禁用。
  public-directory:
    path: ${TEST_AGENT_PUBLIC_DIRECTORY_PATH:/data/agents-pub}
  security:
    api-token: ${TEST_AGENT_API_TOKEN:}
    cors-allowed-origins: ${TEST_AGENT_CORS_ALLOWED_ORIGINS:http://localhost:3000,http://127.0.0.1:3000,http://localhost:4173,http://127.0.0.1:4173,http://localhost:4177,http://127.0.0.1:4177,http://localhost:4187,http://127.0.0.1:4187,http://localhost:5173,http://127.0.0.1:5173,http://localhost:5174,http://127.0.0.1:5174}
  rate-limit:
    enabled: ${TEST_AGENT_RATE_LIMIT_ENABLED:false}
    capacity: ${TEST_AGENT_RATE_LIMIT_CAPACITY:120}
    window: ${TEST_AGENT_RATE_LIMIT_WINDOW:1m}
  managed-workspace:
    root: ${TEST_AGENT_MANAGED_WORKSPACE_ROOT:}
  model-catalog:
    source: ${TEST_AGENT_MODEL_CATALOG_SOURCE:bailian}
    external:
      provider-id: ${TEST_AGENT_EXTERNAL_MODEL_PROVIDER_ID:modelstudio}
      name: ${TEST_AGENT_EXTERNAL_MODEL_PROVIDER_NAME:Model Studio Coding Plan}
      base-url: ${TEST_AGENT_BAILIAN_BASE_URL:https://coding.dashscope.aliyuncs.com/v1}
      api-key-env: ${TEST_AGENT_BAILIAN_API_KEY_ENV:MODELSTUDIO_API_KEY}
      auth-mode: bearer
      default-model: ${TEST_AGENT_BAILIAN_DEFAULT_MODEL:qwen3.5-plus}
    internal:
      provider-id: ${TEST_AGENT_INTERNAL_MODEL_PROVIDER_ID:icbc-openai}
      name: ${TEST_AGENT_INTERNAL_MODEL_PROVIDER_NAME:ICBC OpenAI}
      base-url: ${TEST_AGENT_ICBC_OPENAI_BASE_URL:http://ai-code.sdc.icbc:9070/icbc/jdt/model/api/openai/v1}
      api-key-env: ${TEST_AGENT_ICBC_OPENAI_TOKEN_ENV:ICBC_OPENAI_AUTH_TOKEN}
      auth-mode: ${TEST_AGENT_ICBC_OPENAI_AUTH_MODE:auth-token}
      default-model: ${TEST_AGENT_INTERNAL_DEFAULT_MODEL:DeepSeek-V4-Flash-W8A8}
  redis:
    enabled: ${TEST_AGENT_REDIS_ENABLED:true}
    host: ${TEST_AGENT_REDIS_HOST:127.0.0.1}
    port: ${TEST_AGENT_REDIS_PORT:6379}
    password: ${TEST_AGENT_REDIS_PASSWORD:}
  opencode:
    manager-control:
      # 本地开发：opencode server 已手动启动在 127.0.0.1:4096（与 V17 迁移预置一致），
      # 但通常没有 opencode-manager 容器在跑；用 local 网关直连 baseUrl 做 health/start 占位。
      # production profile 不会继承该值（默认 socket）。
      gateway-mode: ${TEST_AGENT_OPENCODE_GATEWAY_MODE:local}
      token: ${TEST_AGENT_OPENCODE_MANAGER_TOKEN:}
      listen-url: ${TEST_AGENT_BACKEND_LISTEN_URL:http://127.0.0.1:8080}
      linux-server-id: ${TEST_AGENT_LINUX_SERVER_ID:127.0.0.1}
      heartbeat-interval: ${TEST_AGENT_BACKEND_HEARTBEAT_INTERVAL:10s}
      backend-stale-after: ${TEST_AGENT_BACKEND_STALE_AFTER:30s}
      command-timeout: ${TEST_AGENT_OPENCODE_MANAGER_COMMAND_TIMEOUT:10s}
      backend-discovery-limit: ${TEST_AGENT_BACKEND_DISCOVERY_LIMIT:100}
    # 本地开发短路：直接返回合成 READY，跳过 database topology / binding / health。
    # 任何调用方都不会被 manager / V17 容器状态阻塞，默认连 127.0.0.1:4096。
    # production profile 默认 false（见 TestAgentRuntimeProperties.Opencode.localDirect 默认值）。
    local-direct: ${TEST_AGENT_OPENCODE_LOCAL_DIRECT:true}
    local-direct-base-url: ${TEST_AGENT_OPENCODE_BASE_URL:http://127.0.0.1:4096}
    nodes:
      - id: ${TEST_AGENT_OPENCODE_NODE_ID:node_local_opencode}
        base-url: ${TEST_AGENT_OPENCODE_BASE_URL:http://127.0.0.1:4096}
        max-runs: ${TEST_AGENT_OPENCODE_MAX_RUNS:4}
        weight: ${TEST_AGENT_OPENCODE_WEIGHT:100}
        capabilities:
          - chat
          - diff
          - test

management:
  health:
    db:
      enabled: true
