spring:
  config:
    activate:
      on-profile: prod
  datasource:
    druid:
      driver-class-name: org.postgresql.Driver
      url: ${TEST_AGENT_DB_URL}
      username: ${TEST_AGENT_DB_USERNAME}
      password: ${TEST_AGENT_DB_PASSWORD}
  flyway:
    enabled: true
    locations: classpath:db/migration

test-agent:
  security:
    api-token: ${TEST_AGENT_API_TOKEN}
    cors-allowed-origins: ${TEST_AGENT_CORS_ALLOWED_ORIGINS}
  rate-limit:
    enabled: ${TEST_AGENT_RATE_LIMIT_ENABLED:true}
    capacity: ${TEST_AGENT_RATE_LIMIT_CAPACITY:120}
    window: ${TEST_AGENT_RATE_LIMIT_WINDOW:1m}
  redis:
    enabled: ${TEST_AGENT_REDIS_ENABLED:false}
    host: ${TEST_AGENT_REDIS_HOST:127.0.0.1}
    port: ${TEST_AGENT_REDIS_PORT:6379}
