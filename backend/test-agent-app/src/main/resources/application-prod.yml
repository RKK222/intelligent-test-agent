spring:
  config:
    activate:
      on-profile: prod
  datasource:
    druid:
      driver-class-name: org.postgresql.Driver
      url: ${TEST_AGENT_DB_URL}
      username: ${TEST_AGENT_DB_USERNAME}
      password: ${TEST_AGENT_DB_PASSWORD}
  flyway:
    enabled: true
    locations: classpath:db/migration

test-agent:
  security:
    api-token: ${TEST_AGENT_API_TOKEN}
    cors-allowed-origins: ${TEST_AGENT_CORS_ALLOWED_ORIGINS}
  rate-limit:
    enabled: ${TEST_AGENT_RATE_LIMIT_ENABLED:true}
    capacity: ${TEST_AGENT_RATE_LIMIT_CAPACITY:120}
    window: ${TEST_AGENT_RATE_LIMIT_WINDOW:1m}
  redis:
    enabled: ${TEST_AGENT_REDIS_ENABLED:false}
    host: ${TEST_AGENT_REDIS_HOST:}
    port: ${TEST_AGENT_REDIS_PORT:6379}
  # 公共目录：base 协商默认 /data/agents-pub；生产部署必须显式 env 覆盖到实际挂载目录。
  public-directory:
    path: ${TEST_AGENT_PUBLIC_DIRECTORY_PATH:/data/agents-pub}
  model-catalog:
    source: ${TEST_AGENT_MODEL_CATALOG_SOURCE:internal}
    external:
      provider-id: ${TEST_AGENT_EXTERNAL_MODEL_PROVIDER_ID:modelstudio}
      name: ${TEST_AGENT_EXTERNAL_MODEL_PROVIDER_NAME:Model Studio Coding Plan}
      base-url: ${TEST_AGENT_BAILIAN_BASE_URL:https://coding.dashscope.aliyuncs.com/v1}
      api-key-env: ${TEST_AGENT_BAILIAN_API_KEY_ENV:MODELSTUDIO_API_KEY}
      auth-mode: bearer
      default-model: ${TEST_AGENT_BAILIAN_DEFAULT_MODEL:qwen3.5-plus}
    internal:
      provider-id: ${TEST_AGENT_INTERNAL_MODEL_PROVIDER_ID:icbc-openai}
      name: ${TEST_AGENT_INTERNAL_MODEL_PROVIDER_NAME:ICBC OpenAI}
      base-url: ${TEST_AGENT_ICBC_OPENAI_BASE_URL:http://ai-code.sdc.icbc:9070/icbc/jdt/model/api/openai/v1}
      api-key-env: ${TEST_AGENT_ICBC_OPENAI_TOKEN_ENV:ICBC_OPENAI_AUTH_TOKEN}
      auth-mode: ${TEST_AGENT_ICBC_OPENAI_AUTH_MODE:auth-token}
      default-model: ${TEST_AGENT_INTERNAL_DEFAULT_MODEL:DeepSeek-V4-Flash-W8A8}
  opencode:
    manager-control:
      token: ${TEST_AGENT_OPENCODE_MANAGER_TOKEN}
      listen-url: ${TEST_AGENT_BACKEND_LISTEN_URL}
      linux-server-id: ${TEST_AGENT_LINUX_SERVER_ID}
      heartbeat-interval: ${TEST_AGENT_BACKEND_HEARTBEAT_INTERVAL:10s}
      backend-stale-after: ${TEST_AGENT_BACKEND_STALE_AFTER:30s}
      command-timeout: ${TEST_AGENT_OPENCODE_MANAGER_COMMAND_TIMEOUT:10s}
      backend-discovery-limit: ${TEST_AGENT_BACKEND_DISCOVERY_LIMIT:100}
    nodes:
      - id: ${TEST_AGENT_OPENCODE_NODE_ID:node_prod_opencode}
        base-url: ${TEST_AGENT_OPENCODE_BASE_URL}
        max-runs: ${TEST_AGENT_OPENCODE_MAX_RUNS:4}
        weight: ${TEST_AGENT_OPENCODE_WEIGHT:100}
        capabilities:
          - chat
          - diff
          - test
