spring:
  config:
    activate:
      on-profile: test
  datasource:
    druid:
      driver-class-name: org.postgresql.Driver
      url: jdbc:postgresql://${TEST_AGENT_TEST_DB_HOST}:${TEST_AGENT_TEST_DB_PORT:5432}/${TEST_AGENT_TEST_DB_NAME}
      username: ${TEST_AGENT_TEST_DB_USERNAME}
      password: ${TEST_AGENT_TEST_DB_PASSWORD}
  flyway:
    enabled: true
    locations: classpath:db/migration
  data:
    redis:
      host: ${TEST_AGENT_REDIS_HOST:}
      port: ${TEST_AGENT_REDIS_PORT:6379}
      password: ${TEST_AGENT_REDIS_PASSWORD:}
      timeout: ${TEST_AGENT_REDIS_TIMEOUT:1s}

management:
  health:
    db:
      enabled: true

test-agent:
  managed-workspace:
    replica-reconciler:
      enabled: false
  model-catalog:
    source: ${TEST_AGENT_MODEL_CATALOG_SOURCE:internal}
    external:
      provider-id: ${TEST_AGENT_EXTERNAL_MODEL_PROVIDER_ID:external-openai}
      name: ${TEST_AGENT_EXTERNAL_MODEL_PROVIDER_NAME:External OpenAI Compatible}
      base-url: ${TEST_AGENT_EXTERNAL_MODEL_BASE_URL:${TEST_AGENT_BAILIAN_BASE_URL:}}
      api-key-env: ${TEST_AGENT_EXTERNAL_MODEL_API_KEY_ENV:${TEST_AGENT_BAILIAN_API_KEY_ENV:EXTERNAL_API_KEY}}
      auth-mode: bearer
      default-model: ${TEST_AGENT_EXTERNAL_MODEL_DEFAULT_MODEL:${TEST_AGENT_BAILIAN_DEFAULT_MODEL:}}
    internal:
      provider-id: ${TEST_AGENT_INTERNAL_MODEL_PROVIDER_ID:icbc-openai}
      name: ${TEST_AGENT_INTERNAL_MODEL_PROVIDER_NAME:ICBC OpenAI}
      base-url: ${TEST_AGENT_ICBC_OPENAI_BASE_URL:http://ai-code.sdc.icbc:9070/icbc/jdt/model/api/openai/v1}
      api-key-env: ${TEST_AGENT_ICBC_OPENAI_TOKEN_ENV:ICBC_OPENAI_AUTH_TOKEN}
      auth-mode: ${TEST_AGENT_ICBC_OPENAI_AUTH_MODE:auth-token}
      default-model: ${TEST_AGENT_INTERNAL_DEFAULT_MODEL:DeepSeek-V4-Flash-W8A8}
  opencode:
    manager-control:
      token: ${TEST_AGENT_OPENCODE_MANAGER_TOKEN:}
      heartbeat-interval: ${TEST_AGENT_BACKEND_HEARTBEAT_INTERVAL:5s}
      backend-stale-after: ${TEST_AGENT_BACKEND_STALE_AFTER:10s}
      command-timeout: ${TEST_AGENT_OPENCODE_MANAGER_COMMAND_TIMEOUT:10s}
      backend-discovery-limit: ${TEST_AGENT_BACKEND_DISCOVERY_LIMIT:100}
