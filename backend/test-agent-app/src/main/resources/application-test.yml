spring:
  config:
    activate:
      on-profile: test
  datasource:
    druid:
      driver-class-name: org.postgresql.Driver
      url: jdbc:postgresql://${TEST_AGENT_TEST_DB_HOST}:${TEST_AGENT_TEST_DB_PORT:5432}/${TEST_AGENT_TEST_DB_NAME}
      username: ${TEST_AGENT_TEST_DB_USERNAME}
      password: ${TEST_AGENT_TEST_DB_PASSWORD}
  flyway:
    enabled: true
    locations: classpath:db/migration

management:
  health:
    db:
      enabled: true

test-agent:
  redis:
    enabled: ${TEST_AGENT_REDIS_ENABLED:false}
    host: ${TEST_AGENT_REDIS_HOST:}
    port: ${TEST_AGENT_REDIS_PORT:6379}
  opencode:
    nodes:
      - id: ${TEST_AGENT_OPENCODE_NODE_ID:node_test_opencode}
        base-url: ${TEST_AGENT_OPENCODE_BASE_URL}
        max-runs: ${TEST_AGENT_OPENCODE_MAX_RUNS:4}
        weight: ${TEST_AGENT_OPENCODE_WEIGHT:100}
        capabilities:
          - chat
          - diff
          - test
